name: Deployment
on:
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to deploy to
        type: choice
        required: true
        options:
          - production
          - recette
          - pentest
      app_version:
        description: app version
        type: string
        required: true
        default: latest
  workflow_call:
    inputs:
      environment:
        description: The environment to deploy to
        type: string
        default: latest
        required: false
      app_version:
        description: app version
        type: string
        required: false
        default: latest
    secrets:
      DEPLOY_SSH_PRIVATE_KEY:
        description: SSH private key
        required: true
      DEPLOY_PASS:
        description: SSH PWD TO DEPLOY
        required: true
      SLACK_WEBHOOK:
        description: Slack webhook URL
        required: true
      OPENPGP_PRIVATE_SUBKEY:
        description: Github Actions' OpenPGP private subkey
        required: true
      TOKEN_MNA_SHARED:
        description: Authentication token for accessing private repositories
        required: true
      PROJECT_TOKEN:
        description: Token with project scope for updating GitHub Project items
        required: false

jobs:
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - name: Checkout project
        if: ${{ inputs.app_version == 'latest' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get Version
        id: get-version
        shell: bash
        run: |
          if [[ "${APP_VERSION}" == "latest" ]]; then
            echo "VERSION=$(git describe --tags --abbrev=0 --candidates 100 --always | cut -c 2-)" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          fi
        env:
          APP_VERSION: ${{ inputs.app_version }}

  npm-packages-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Clone mna-npm-check repository
        uses: actions/checkout@v6
        with:
          repository: mission-apprentissage/mna-npm-check
          path: mna-npm-check

      - name: Analyze NPM dependancies
        run: mna-npm-check/npm-check.sh -p .

  deploy:
    if: ${{ success() }}
    needs: ["version", "npm-packages-check"]
    name: Deploy ${{ needs.version.outputs.VERSION }} on ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Notify new deployment on Slack
        uses: ravsamhq/notify-slack-action@v2
        if: always()
        with:
          status: ${{ job.status }}
          notification_title: "Déploiement ${{ needs.version.outputs.VERSION }} en ${{ inputs.environment }} initié..."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Get Action IP
        run: curl -4 ifconfig.me

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.TOKEN_MNA_SHARED }}
          submodules: true

      - name: Initialize the GnuPG keyring
        run: |
          echo -n "$OPENPGP_KEY" | gpg --import
        env:
          OPENPGP_KEY: ${{ secrets.OPENPGP_PRIVATE_SUBKEY }}

      - name: Setup SOPS
        uses: nhedger/setup-sops@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          name: github_actions
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          known_hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          config: |
            Host *
              IdentityFile ~/.ssh/github_actions

      - name: Run playbook
        run: .bin/mna-lba app:deploy ${{ inputs.environment }} --extra-vars "app_version=${{ needs.version.outputs.VERSION }}"
        env:
          ANSIBLE_REMOTE_USER: deploy
          ANSIBLE_BECOME_PASS: ${{ secrets.DEPLOY_PASS }}

      - name: Encrypt logs
        run: .bin/mna-lba app:deploy:log:encrypt
        if: always()

      - name: Upload logs artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ inputs.environment }}
          path: /tmp/deploy.log.gpg

      - name: Add Job summary
        if: always()
        run: echo 'You can get logs using `.bin/mna app:deploy:log:decrypt ${{ github.run_id }} ${{ inputs.environment }}`' >> $GITHUB_STEP_SUMMARY

      - name: Notify failure on Slack
        uses: ravsamhq/notify-slack-action@v2
        if: always()
        with:
          status: ${{ job.status }}
          notification_title: "Le déploiement ${{ needs.version.outputs.VERSION }} en ${{ inputs.environment }} a échoué"
          message_format: "{emoji} *[${{ inputs.environment }}]* *{workflow}* {status_message} in <{repo_url}|{branch}> on <{commit_url}|{commit_sha}>. You can get error logs using `.bin/mna-lba app:deploy:log:decrypt ${{ github.run_id }} ${{ inputs.environment }}`"
          notify_when: "failure"
          mention_groups: "S0693U59FCK"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify success on Slack
        uses: ravsamhq/notify-slack-action@v2
        if: always()
        with:
          status: ${{ job.status }}
          notification_title: "Déploiement ${{ needs.version.outputs.VERSION }} en ${{ inputs.environment }} terminé avec succès"
          notify_when: "success"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: notify sentry that a new version has been deployed
        run: .bin/mna-lba sentry:deploy ${{ inputs.environment }} ${{ needs.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ env.GITHUB_REF_NAME }}

  changelog:
    if: ${{ success() && inputs.environment == 'production' }}
    needs: ["version", "deploy"]
    name: Post changelog to Slack
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Post changelog to Slack
        shell: bash
        run: |
          CURRENT_TAG="v${{ needs.version.outputs.VERSION }}"

          # Itère sur les derniers runs réussis pour trouver le dernier déploiement en production
          # (le workflow tourne aussi pour recette/pentest, donc on ne peut pas juste prendre head -1).
          PREV_TAG=""
          RUN_IDS=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/workflows/_deploy.yml/runs?status=success&per_page=20" \
            --jq ".workflow_runs[] | select(.id | tostring != \"$GITHUB_RUN_ID\") | .id")

          for RUN_ID in $RUN_IDS; do
            PREV_VERSION=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/jobs" \
              --jq 'first(.jobs[] | select(.name | test("Deploy .* on production")) | .name | capture("Deploy (?<v>.*) on production") | .v) // empty')
            if [ -n "$PREV_VERSION" ]; then
              PREV_TAG="v${PREV_VERSION}"
              break
            fi
          done

          if [ -z "$PREV_TAG" ]; then
            echo "No previous production run found, skipping"
            exit 0
          fi

          # Transmettre les tags aux steps suivants
          echo "PREV_TAG=${PREV_TAG}" >> "$GITHUB_ENV"
          echo "CURRENT_TAG=${CURRENT_TAG}" >> "$GITHUB_ENV"

          TODAY=$(date +%Y-%m-%d)
          NL=$'\n'

          FEAT_LINES=""
          FIX_LINES=""
          CHORE_LINES=""
          OTHER_LINES=""

          while IFS=$'\t' read -r hash author subject; do
            desc=$(echo "$subject" | sed -E 's/^[a-z]+(\([^)]*\))?: //')
            if echo "$subject" | grep -qE '^feat[\(:]'; then
              FEAT_LINES+="• ${author} - ${desc} (${hash})${NL}"
            elif echo "$subject" | grep -qE '^fix[\(:]'; then
              FIX_LINES+="• ${author} - ${desc} (${hash})${NL}"
            elif echo "$subject" | grep -qE '^chore[\(:]'; then
              CHORE_LINES+="• ${author} - ${desc} (${hash})${NL}"
            else
              OTHER_LINES+="• ${author} - ${subject} (${hash})${NL}"
            fi
          done < <(git log --pretty=format:"%h%x09%an%x09%s" "${PREV_TAG}..${CURRENT_TAG}")

          if [ -z "$FEAT_LINES" ] && [ -z "$FIX_LINES" ] && [ -z "$CHORE_LINES" ] && [ -z "$OTHER_LINES" ]; then
            echo "No commits between ${PREV_TAG} and ${CURRENT_TAG}, skipping"
            exit 0
          fi

          MESSAGE=":rocket: *Déployé en production !*${NL}${PREV_TAG} → *${CURRENT_TAG}* (${TODAY})${NL}"
          [ -n "$FEAT_LINES" ] && MESSAGE+="${NL}*Nouvelles fonctionnalités*${NL}${NL}${FEAT_LINES}"
          [ -n "$FIX_LINES" ]  && MESSAGE+="${NL}*Corrections*${NL}${NL}${FIX_LINES}"
          [ -n "$CHORE_LINES" ] && MESSAGE+="${NL}*Maintenance*${NL}${NL}${CHORE_LINES}"
          [ -n "$OTHER_LINES" ] && MESSAGE+="${NL}*Autres changements*${NL}${NL}${OTHER_LINES}"

          jq -n --arg text "$MESSAGE" '{text: $text}' \
          | curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data @-
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark linked issues as en-production in GitHub Project
        shell: bash
        run: |
          PR_NUMBERS=$(git log --pretty=format:"%s" "${PREV_TAG}..${CURRENT_TAG}" \
            | grep -oP '\(#\K[0-9]+(?=\))' || true)

          for PR in $PR_NUMBERS; do
            # Utilise closingIssuesReferences pour ne cibler que les issues liées via Closes/Fixes/Resolves
            ISSUE_NUMBERS=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    closingIssuesReferences(first: 10) {
                      nodes { number }
                    }
                  }
                }
              }' -f owner="mission-apprentissage" -f repo="labonnealternance" -F pr="$PR" \
              --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null || true)

            for ISSUE in $ISSUE_NUMBERS; do
              ITEM_ID=$(gh api graphql -f query='
                query($owner: String!, $repo: String!, $issue: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issue) {
                      projectItems(first: 100) {
                        nodes { id project { number } }
                      }
                    }
                  }
                }' -f owner="mission-apprentissage" -f repo="labonnealternance" -F issue="$ISSUE" \
                --jq '[.data.repository.issue.projectItems.nodes[] | select(.project.number == 14) | .id] | first' 2>/dev/null || true)

              if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
                gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId itemId: $itemId fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) { projectV2Item { id } }
                  }' \
                  -f projectId="PVT_kwDOA8sl_s4BW3Li" \
                  -f itemId="$ITEM_ID" \
                  -f fieldId="PVTSSF_lADOA8sl_s4BW3LizhSIG_8" \
                  -f optionId="a9d4a5ea" && echo "Issue #$ISSUE → en-production" || echo "Issue #$ISSUE → échec mise à jour"
              fi
            done
          done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
