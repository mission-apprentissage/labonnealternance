name: CI

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        description: Code coverrage token
        required: true
jobs:
  npm-packages-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Clone mna-npm-check repository
        uses: actions/checkout@v4
        with:
          repository: mission-apprentissage/mna-npm-check
          path: mna-npm-check

      - name: Analyze NPM dependancies
        run: mna-npm-check/npm-check.sh -p .

  tests:
    if: ${{ success() }}
    needs: ["npm-packages-check"]
    timeout-minutes: 10
    name: "Tests"
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Debug checkout context
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.head_ref=${{ github.head_ref }}"
          echo "github.base_ref=${{ github.base_ref }}"
          echo "github.event.pull_request.head.sha=${{ github.event.pull_request.head.sha || '' }}"
          echo "github.event.pull_request.base.sha=${{ github.event.pull_request.base.sha || '' }}"
          echo "git rev-parse HEAD=$(git rev-parse HEAD)"
          echo "git show --no-patch --format=%P HEAD=$(git show --no-patch --format=%P HEAD)"

      - uses: useblacksmith/setup-node@v5
        with:
          node-version: 24

      - name: Mount Yarn Berry cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-yarn-berry-cache
          path: ~/.yarn/berry/cache

      - name: Mount node_modules cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-node-modules-${{ hashFiles('yarn.lock') }}
          path: ./node_modules

      - name: Mount build cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-build-cache
          path: ./.cache

      - name: Mount shared dist cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-shared-dist
          path: ./shared/dist

      - name: Install dependencies
        run: |
          if [ ! -f ./node_modules/.yarn-state.yml ]; then
            yarn install --immutable
          fi

      - name: Make sure to use same dependencies version across all packages
        run: yarn dedupe --check

      - name: typecheck
        run: yarn typecheck

      - name: lint & format
        run: yarn check:ci

      - name: start mongodb service
        run: |
          docker compose up --build -d --wait mongodb
          yarn setup:mongodb

      - name: test
        run: yarn test:ci

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
