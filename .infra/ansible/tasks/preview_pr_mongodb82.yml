---
- name: "[{{ pr_number }}] Get Pull Request Infos"
  ansible.builtin.shell: curl -s https://api.github.com/repos/mission-apprentissage/{{repo_name}}/pulls/{{ pr_number }}
  register: result

- name: "[{{ pr_number }}] Save Pull Requests Infos"
  set_fact:
    pr_commit_id: "{{ result.stdout | from_json | json_query('head.sha') }}"
    pr_title: "{{ result.stdout | from_json | json_query('title') }}"
    pr_state: "{{ result.stdout | from_json | json_query('state') }}"
    pr_branch: "{{ result.stdout | from_json | json_query('head.ref') }}"

- name: "[{{ pr_number }}] Deploying preview"
  when:
    - pr_state == 'open'
    - build == true
  block:
    - name: "[{{ pr_number }}] création du répertoire de build"
      file:
        path: /opt/app/projects/{{ pr_number }}
        state: directory
        owner: root
        group: root
        mode: 770

    # --- MongoDB 8.2 setup ---
    - name: "[{{ pr_number }}] Override LBA_MONGODB_URI pour MongoDB 8.2"
      set_fact:
        LBA_MONGODB_URI: "mongodb://__system:{{ MONGODB_KEYFILE }}@lba_{{ pr_number }}_mongodb:27017/preview_{{ pr_number }}?authSource=local&directConnection=true"

    - name: "[{{ pr_number }}] Template mongod82.conf"
      ansible.builtin.template:
        src: "{{ inventory_dir }}/../files/configs/mongodb82/mongod.conf.j2"
        dest: "/opt/app/projects/{{ pr_number }}/mongod82.conf"

    - name: "[{{ pr_number }}] Template mongot82.yml"
      ansible.builtin.template:
        src: "{{ inventory_dir }}/../files/configs/mongot/mongot.yml.j2"
        dest: "/opt/app/projects/{{ pr_number }}/mongot82.yml"

    - name: "[{{ pr_number }}] Créer le fichier mot de passe mongot"
      ansible.builtin.copy:
        content: "{{ MONGOT_PASSWORD }}"
        dest: "/opt/app/projects/{{ pr_number }}/mongot_password"
        mode: "0400"

    - name: "[{{ pr_number }}] Créer le keyfile MongoDB 8.2 (uid 1000)"
      ansible.builtin.copy:
        content: "{{ MONGODB_KEYFILE }}"
        dest: "/opt/app/projects/{{ pr_number }}/mongo_keyfile"
        mode: "0400"
        owner: 1000
        group: 1000

    - name: "[{{ pr_number }}] Copier docker-compose.preview-mongodb82.yml"
      ansible.builtin.template:
        src: "{{ inventory_dir }}/../docker-compose.preview-mongodb82.yml"
        dest: "/opt/app/projects/{{ pr_number }}/docker-compose.mongodb82.yml"
    # --- fin MongoDB 8.2 setup ---

    - name: "[{{ pr_number }}] copy server env file"
      ansible.builtin.copy:
        content: "{{ lookup('ansible.builtin.template', '../.env_server') }}"
        dest: "/opt/app/projects/{{ pr_number }}/.env_server"

    - name: "[{{ pr_number }}] copy ui env file"
      ansible.builtin.copy:
        content: "{{ lookup('ansible.builtin.template', '../.env_ui') }}"
        dest: "/opt/app/projects/{{ pr_number }}/.env_ui"

    - name: "[{{ pr_number }}] creation du fichier docker compose"
      ansible.builtin.template:
        src: "{{inventory_dir}}/../docker-compose.preview.yml"
        dest: "/opt/app/projects/{{ pr_number }}/docker-compose.yml"

    - name: "Check if repository exists"
      stat:
        path: "/opt/app/projects/{{ pr_number }}/repository"
      register: check_stat

    - name: "Pruning repository references"
      shell:
        chdir: "/opt/app/projects/{{ pr_number }}/repository"
        cmd: git remote prune origin
      when: check_stat.stat.exists

    - name: "[{{ pr_number }}] Clone du repository"
      git:
        repo: "git@github.com:mission-apprentissage/{{repo_name}}.git"
        recursive: false
        version: "{{ pr_commit_id }}"
        force: yes
        accept_newhostkey: yes
        dest: "/opt/app/projects/{{ pr_number }}/repository"

    - name: "[{{ pr_number }}] Clone mna-shared-bin submodules"
      shell:
        cmd: "git -C '/opt/app/projects/{{ pr_number }}/repository' submodule update --init .bin/shared"

    - name: "[{{ pr_number }}] Root only pour tous les répertoires applicatifs"
      file:
        path: "{{item}}"
        state: directory
        owner: root
        group: root
        mode: 770
      with_items:
        - "/opt/app/projects/{{ pr_number }}/repository"

    - name: "[{{ pr_number }}] Build local images 0.0.0-{{ pr_number }}"
      shell:
        cmd: "flock --verbose --close /tmp/deployment_build.lock .bin/mna-lba app:build 0.0.0-{{ pr_number }} load commit-hash-temp preview"
        chdir: "/opt/app/projects/{{ pr_number }}/repository"
      environment:
        CI: "{{ CI | default('true') }}"
      async: 1500 # max 15 minutes
      poll: 15 # check every 15s

    - name: "[{{ pr_number }}] Check if preview is already running"
      stat:
        path: "/opt/app/projects/{{ pr_number }}"
      register: preview_exists

    - name: "[{{ pr_number }}] Stop existing application before deploy"
      shell:
        chdir: "/opt/app/projects/{{ pr_number }}"
        cmd: docker compose -f docker-compose.yml -f docker-compose.mongodb82.yml down --remove-orphans --volumes
      when: preview_exists.stat.exists
      ignore_errors: true

    - name: "[{{ pr_number }}] Démarrer MongoDB 8.2"
      shell:
        chdir: "/opt/app/projects/{{ pr_number }}"
        cmd: docker compose -f docker-compose.yml -f docker-compose.mongodb82.yml up -d --wait mongodb

    - name: "[{{ pr_number }}] Init replica set MongoDB 8.2"
      shell:
        cmd: >
          docker exec lba_{{ pr_number }}_mongodb mongosh
          "mongodb://__system:{{ MONGODB_KEYFILE }}@127.0.0.1:27017/?authSource=local&directConnection=true"
          --eval "try { rs.status().ok } catch (e) { if (e.code === 94) { rs.initiate({ _id: 'replica', members: [{ _id: 0, host: 'lba_{{ pr_number }}_mongodb:27017' }] }); var i = 0; while (rs.status().myState !== 1 && i++ < 30) { sleep(1000); } } else { throw e } }"
          --quiet

    - name: "[{{ pr_number }}] Créer mongotUser"
      shell:
        cmd: >
          docker exec lba_{{ pr_number }}_mongodb mongosh
          "mongodb://__system:{{ MONGODB_KEYFILE }}@127.0.0.1:27017/admin?authSource=local&directConnection=true"
          --eval "try { db.dropUser('mongotUser') } catch(e) {}
          db.createUser({ user: 'mongotUser', pwd: '{{ MONGOT_PASSWORD }}',
          roles: [{ role: 'searchCoordinator', db: 'admin' }] })"
          --quiet

    - name: "[{{ pr_number }}] Check if database is already seeded (MongoDB 8.2)"
      shell:
        cmd: >
          docker exec lba_{{ pr_number }}_mongodb mongosh
          "mongodb://__system:{{ MONGODB_KEYFILE }}@127.0.0.1:27017/preview_{{ pr_number }}?authSource=local&directConnection=true"
          --eval "db.getCollectionNames().length" --quiet
      register: db_collections_count
      ignore_errors: true

    - name: "[{{ pr_number }}] Seed database (MongoDB 8.2)"
      shell:
        chdir: "/opt/app"
        cmd: "flock --verbose --timeout 600 --close /tmp/deployment_seed.lock /opt/app/scripts/seed.sh preview_{{ pr_number | default('00') }}"
      async: 1500 # max 20 minutes
      poll: 15 # check every 15s
      when: >
        lookup('env', 'FORCE_SEED') == 'true' or
        db_collections_count.rc != 0 or
        (db_collections_count.stdout | trim | int) == 0

    - name: "[{{ pr_number }}] Start Application"
      shell:
        chdir: "/opt/app/projects/{{ pr_number }}"
        cmd: docker compose -f docker-compose.yml -f docker-compose.mongodb82.yml up -d --remove-orphans --wait

    - name: "[{{ pr_number }}] Create MongoDB indexes (after mongot)"
      shell:
        chdir: "/opt/app/projects/{{ pr_number }}"
        cmd: "docker compose -f docker-compose.yml -f docker-compose.mongodb82.yml run --rm server yarn cli indexes:recreate"
      async: 900 # max 15 minutes
      poll: 15

    - name: "[{{ pr_number }}] Create Atlas Search indexes"
      shell:
        cmd: "bash /opt/app/scripts/create-search-indexes.sh"
      environment:
        LBA_MONGODB_URI: "{{ LBA_MONGODB_URI }}"
        MONGO_CONTAINER: "lba_{{ pr_number }}_mongodb"
      async: 300
      poll: 10 # check every 15s

    - name: "[{{ pr_number }}] Trigger ACME companion"
      shell:
        chdir: /opt/app
        cmd: docker exec nginx-proxy-acme /app/signal_le_service

    - name: "[{{ pr_number }}] Register database in Metabase"
      shell:
        cmd: "bash /opt/app/configs/metabase/add-preview-database.sh {{ pr_number }} '{{ LBA_METABASE_MONGODB_URI }}'"
      ignore_errors: true

    - name: "[{{ pr_number }}] Preview URL"
      debug:
        msg: "{{ LBA_PUBLIC_URL }}"

- name: "[{{ pr_number }}] Uninstalling preview"
  when: pr_state != 'open'
  block:
    - name: "[{{ pr_number }}] Check if preview is deployed"
      stat:
        path: "/opt/app/projects/{{ pr_number }}"
      register: check_stat

    - name: "[{{ pr_number }}] Stopping the preview"
      shell:
        chdir: "/opt/app/projects/{{ pr_number }}"
        cmd: docker compose -f docker-compose.yml -f docker-compose.mongodb82.yml down --remove-orphans --volumes
      when: check_stat.stat.exists
      ignore_errors: true

    - name: "[{{ pr_number }}] Removing {{ item }}:0.0.0-{{ pr_number }} image"
      shell:
        cmd: "docker image rm -f ghcr.io/mission-apprentissage/{{ item }}:0.0.0-{{ pr_number }}"
      when: check_stat.stat.exists
      loop: "{{ docker_images }}"

    - name: "[{{ pr_number }}] Remove database from Metabase"
      shell:
        cmd: "bash /opt/app/configs/metabase/remove-preview-database.sh {{ pr_number }}"
      ignore_errors: true

    - name: "[{{ pr_number }}] Removing preview directory"
      shell:
        cmd: "rm -rf /opt/app/projects/{{ pr_number }}"
      when: check_stat.stat.exists

    - name: "[{{ pr_number }}] Clean Docker"
      shell: docker system prune --force --volumes
