name: "lba_preview_{{pr_number}}"

services:
  mongodb:
    image: mongodb/mongodb-community-server:8.2-ubuntu2204
    container_name: lba_{{pr_number}}_mongodb
    hostname: lba_{{pr_number}}_mongodb
    command: ["mongod", "--config", "/etc/mongod/mongod.conf"]
    deploy:
      resources:
        limits:
          memory: 1g
    restart: always
    volumes:
      - mongodb82:/data/db
      - /opt/app/projects/{{pr_number}}/mongod82.conf:/etc/mongod/mongod.conf:ro
      - /opt/app/projects/{{pr_number}}/mongo_keyfile:/tmp/mongo_keyfile:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 20s
      retries: 30
      start_period: 30s
    networks:
      - mna_network
    labels:
      - autoheal=true

  mongot:
    image: mongodb/mongodb-community-search:0.60.1
    container_name: lba_{{pr_number}}_mongot
    network_mode: "service:mongodb"
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    volumes:
      - mongotdata:/var/lib/mongot
      - /opt/app/projects/{{pr_number}}/mongot82.yml:/mongot-community/config.default.yml:ro
      - /opt/app/projects/{{pr_number}}/mongot_password:/etc/mongot/secrets/passwordFile:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    depends_on:
      mongodb:
        condition: service_healthy

  server:
    volumes:
      - /opt/app/scripts/create-search-indexes.sh:/app/.infra/files/scripts/create-search-indexes.sh:ro
      - /opt/app/projects/{{pr_number}}/repository/docs/mongodb/search-synonyms.json:/app/docs/mongodb/search-synonyms.json:ro

volumes:
  mongodb82:
  mongotdata:

networks:
  mna_network:
    name: mna_network
    external: true
